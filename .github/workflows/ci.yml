name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo clippy (redis feature)
        run: cargo clippy --all-targets --features redis -- -D warnings
      - name: cargo clippy (rabbitmq feature)
        run: cargo clippy --all-targets --features rabbitmq -- -D warnings
      - name: cargo clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (default features)
        run: cargo test --all-targets
      - name: cargo test (redis feature)
        run: cargo test --all-targets --features redis
      - name: cargo test (rabbitmq feature)
        run: cargo test --all-targets --features rabbitmq
