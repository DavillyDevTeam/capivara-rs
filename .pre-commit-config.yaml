# Mirrors CI: rustfmt check + clippy with -D warnings
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all -- --check
        pass_filenames: false
        types: [file]
        files: '(\.rs$)|(^Cargo\.(toml|lock)$)'

      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --all-targets --all-features -- -D warnings
        pass_filenames: false
        types: [file]
        files: '(\.rs$)|(^Cargo\.(toml|lock)$)'
