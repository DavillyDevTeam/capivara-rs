[package]
name = "capivara"
version = "0.0.1"
edition = "2024"
publish = false
rust-version = "1.85"
description = "Rust-idiomatic async job/worker library (Celery-like topology, typed Task API)"
license = "MIT OR Apache-2.0"
repository = "https://github.com/DavillyDevTeam/capivara-rs"
readme = "README.md"
keywords = ["queue", "worker", "jobs", "async", "tokio"]
categories = ["asynchronous", "network-programming"]
authors = ["Duarte Mainart Tecnologia e Publicidade LTDA"]

[dependencies]
async-trait = "0.1.89"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["rt", "rt-multi-thread", "macros", "sync"] }
uuid = { version = "1.23.4", features = ["v4", "serde"] }

[lib]
name = "capivara"
path = "src/lib.rs"

[dev-dependencies]
tokio = { version = "1.52.3", features = ["rt", "rt-multi-thread", "macros"] }
